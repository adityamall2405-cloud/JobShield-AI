services:
  - type: web
    name: jobshield-api
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && python backend/train_model.py --data fake_job_postings.csv --output backend/models/jobshield_model.joblib
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    plan: free
